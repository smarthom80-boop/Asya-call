<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ася Звонилка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Onest:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0e14;
    --bg2: #13141d;
    --card: #181923;
    --card2: #1e1f2e;
    --border: rgba(255,255,255,0.07);
    --purple: #7c5cfc;
    --purple2: #9b7fff;
    --purple-dim: rgba(124,92,252,0.18);
    --text: #e8e8f0;
    --muted: #6b6b80;
    --green: #4ade80;
    --red: #f87171;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Onest', sans-serif;
    overflow-x: hidden;
  }

  /* Фоновый эффект */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(124,92,252,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 600px;
    margin: 0 auto;
    padding: 48px 20px 80px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Логотип */
  .logo {
    text-align: center;
    margin-bottom: 8px;
  }
  .logo h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff 30%, var(--purple2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo h1 span {
    background: linear-gradient(135deg, var(--purple) 0%, var(--purple2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo p {
    margin-top: 8px;
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  /* Карточки */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    backdrop-filter: blur(12px);
  }

  .card-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  /* Статус */
  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.4s;
    flex-shrink: 0;
  }
  .status-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  .status-dot.error { background: var(--red); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .status-text {
    font-size: 0.8rem;
    color: var(--muted);
  }

  /* ID поле */
  .id-box {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 14px 14px 20px;
    min-height: 56px;
  }
  .id-value {
    flex: 1;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.85rem;
    color: var(--purple2);
    letter-spacing: 0.05em;
    word-break: break-all;
    min-width: 0;
  }
  .id-value.loading { color: var(--muted); font-size: 0.75rem; }

  .btn-copy {
    flex-shrink: 0;
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-family: 'Onest', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-copy:hover { background: var(--purple2); transform: translateY(-1px); }
  .btn-copy:active { transform: translateY(0); }
  .btn-copy.copied { background: var(--green); color: #000; }

  /* Поле ввода ID */
  .input-field {
    width: 100%;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    font-family: 'Onest', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .input-field::placeholder { color: var(--muted); }
  .input-field:focus { border-color: rgba(124,92,252,0.5); }

  /* Переключатель аудио/видео */
  .mode-row {
    display: flex;
    gap: 10px;
    margin: 14px 0;
  }
  .btn-mode {
    flex: 1;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    color: var(--muted);
    font-family: 'Onest', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-mode:hover { border-color: rgba(124,92,252,0.4); color: var(--text); }
  .btn-mode.active {
    background: var(--purple-dim);
    border-color: var(--purple);
    color: var(--purple2);
  }

  /* Кнопка позвонить */
  .btn-call {
    width: 100%;
    background: linear-gradient(135deg, var(--purple) 0%, #a066ff 100%);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 18px;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.25s;
    text-transform: uppercase;
  }
  .btn-call:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,92,252,0.4); }
  .btn-call:active { transform: translateY(0); }
  .btn-call:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Звонок — экран */
  .call-screen {
    display: none;
    flex-direction: column;
    gap: 12px;
  }
  .call-screen.active { display: flex; }

  .video-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .video-wrap {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    aspect-ratio: 4/3;
    position: relative;
  }
  .video-wrap video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .video-label {
    position: absolute;
    bottom: 8px; left: 10px;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.6);
    font-family: 'Unbounded', sans-serif;
    letter-spacing: 0.05em;
  }
  .audio-indicator {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    display: none;
  }
  .audio-wave {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 4px;
    height: 40px;
    margin-bottom: 12px;
  }
  .wave-bar {
    width: 4px;
    background: var(--purple);
    border-radius: 2px;
    animation: wave 1.2s ease-in-out infinite;
  }
  .wave-bar:nth-child(1) { height: 15px; animation-delay: 0s; }
  .wave-bar:nth-child(2) { height: 30px; animation-delay: 0.15s; }
  .wave-bar:nth-child(3) { height: 22px; animation-delay: 0.3s; }
  .wave-bar:nth-child(4) { height: 35px; animation-delay: 0.1s; }
  .wave-bar:nth-child(5) { height: 18px; animation-delay: 0.25s; }
  .wave-bar:nth-child(6) { height: 28px; animation-delay: 0.05s; }
  @keyframes wave {
    0%, 100% { transform: scaleY(0.5); opacity: 0.6; }
    50% { transform: scaleY(1); opacity: 1; }
  }
  .audio-caller { font-size: 0.9rem; color: var(--muted); }

  .call-controls {
    display: flex;
    gap: 10px;
  }
  .btn-ctrl {
    flex: 1;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px;
    color: var(--muted);
    font-family: 'Onest', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-ctrl:hover { border-color: rgba(124,92,252,0.4); color: var(--text); }
  .btn-ctrl.danger {
    background: rgba(248,113,113,0.12);
    border-color: rgba(248,113,113,0.3);
    color: var(--red);
  }
  .btn-ctrl.danger:hover { background: rgba(248,113,113,0.22); }

  /* Входящий звонок */
  .incoming {
    display: none;
    background: var(--card);
    border: 1px solid rgba(124,92,252,0.35);
    border-radius: 20px;
    padding: 24px;
    text-align: center;
    gap: 16px;
    flex-direction: column;
    animation: slideIn 0.3s ease;
  }
  .incoming.active { display: flex; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .incoming-title { font-family: 'Unbounded', sans-serif; font-size: 0.7rem; letter-spacing: 0.1em; color: var(--purple2); text-transform: uppercase; }
  .incoming-id { font-size: 0.85rem; color: var(--muted); word-break: break-all; }
  .incoming-btns { display: flex; gap: 10px; }
  .btn-accept {
    flex: 1; background: var(--green); color: #000;
    border: none; border-radius: 12px; padding: 14px;
    font-family: 'Unbounded', sans-serif; font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s;
  }
  .btn-accept:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(74,222,128,0.35); }
  .btn-decline {
    flex: 1; background: rgba(248,113,113,0.12); color: var(--red);
    border: 1px solid rgba(248,113,113,0.3); border-radius: 12px; padding: 14px;
    font-family: 'Unbounded', sans-serif; font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s;
  }
  .btn-decline:hover { background: rgba(248,113,113,0.22); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 0.8rem;
    color: var(--text);
    transition: transform 0.3s ease;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Ссылка */
  .share-link {
    font-size: 0.72rem;
    color: var(--muted);
    word-break: break-all;
    margin-top: 6px;
    line-height: 1.5;
  }
  .share-link a { color: var(--purple2); text-decoration: none; }

  hr.divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 4px 0;
  }
</style>
</head>
<body>

<div class="wrapper">

  <!-- Логотип -->
  <div class="logo">
    <h1>ася<span>•</span>звонилка</h1>
    <p>аудио и видеозвонки прямо в браузере</p>
  </div>

  <!-- Входящий звонок -->
  <div class="incoming" id="incoming">
    <div class="incoming-title">📞 входящий звонок</div>
    <div class="incoming-id" id="incomingId">—</div>
    <div class="incoming-btns">
      <button class="btn-accept" id="btnAccept">✓ принять</button>
      <button class="btn-decline" id="btnDecline">✕ отклонить</button>
    </div>
  </div>

  <!-- Звонок активен -->
  <div class="call-screen" id="callScreen">
    <div class="card-label" style="padding-left:2px">в эфире</div>
    <div class="video-grid" id="videoGrid">
      <div class="video-wrap">
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="video-label">вы</div>
      </div>
      <div class="video-wrap">
        <video id="remoteVideo" autoplay playsinline></video>
        <div class="video-label">собеседник</div>
      </div>
    </div>
    <div class="audio-indicator" id="audioIndicator">
      <div class="audio-wave">
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div>
      </div>
      <div class="audio-caller">голосовой звонок</div>
    </div>
    <div class="call-controls">
      <button class="btn-ctrl" id="btnMute">🎤 звук</button>
      <button class="btn-ctrl danger" id="btnHangup">✕ завершить</button>
    </div>
  </div>

  <!-- Твой ID -->
  <div class="card" id="mainCard">
    <div class="card-label">твой id</div>
    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">подключение...</div>
    </div>
    <div class="id-box">
      <div class="id-value loading" id="myId">—</div>
      <button class="btn-copy" id="btnCopy" onclick="copyId()">скопировать</button>
    </div>
    <div class="share-link" id="shareLink" style="display:none">
      ссылка: <a id="shareLinkA" href="#"></a>
    </div>
    <hr class="divider" style="margin-top:14px">
    <div style="margin-top:12px">
      <div class="card-label" style="margin-bottom:10px">🔒 пин-код (необязательно)</div>
      <input class="input-field" id="myPin" type="text" maxlength="16" placeholder="установи пин — только знающий войдёт" style="font-size:0.82rem">
      <div style="font-size:0.72rem; color:var(--muted); margin-top:8px; line-height:1.5">если задать пин — чужие звонки без него будут автоматически отклонены</div>
    </div>
  </div>

  <!-- Позвонить -->
  <div class="card" id="dialCard">
    <div class="card-label">позвонить</div>
    <input class="input-field" id="remoteIdInput" type="text" placeholder="ID друга или вставь ссылку">
    <input class="input-field" id="remotePin" type="text" maxlength="16" placeholder="пин-код собеседника (если он установил)" style="margin-top:10px; font-size:0.82rem">
    <div class="mode-row">
      <button class="btn-mode active" id="btnAudio" onclick="setMode('audio')">🎙 аудио</button>
      <button class="btn-mode" id="btnVideo" onclick="setMode('video')">📹 видео</button>
    </div>
    <button class="btn-call" id="btnCall" disabled onclick="makeCall()">позвонить</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let peer, myPeerId, currentCall, localStream;
let callMode = 'audio';
let muted = false;

// Инициализация PeerJS
function initPeer() {
  peer = new Peer(undefined, {
    host: '0.peerjs.com',
    port: 443,
    path: '/',
    secure: true,
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' },
        { urls: 'stun:stun3.l.google.com:19302' }
      ]
    }
  });

  peer.on('open', id => {
    myPeerId = id;
    document.getElementById('myId').textContent = id;
    document.getElementById('myId').classList.remove('loading');
    document.getElementById('statusDot').className = 'status-dot online';
    document.getElementById('statusText').textContent = 'онлайн';
    document.getElementById('btnCall').disabled = false;

    // Ссылка
    const link = window.location.origin + window.location.pathname + '?call=' + id;
    const el = document.getElementById('shareLinkA');
    el.href = link;
    el.textContent = link.replace('https://', '');
    document.getElementById('shareLink').style.display = 'block';

    // Если открыли по ссылке
    const params = new URLSearchParams(window.location.search);
    if (params.get('call')) {
      document.getElementById('remoteIdInput').value = params.get('call');
    }
  });

  peer.on('call', incoming => {
    // Проверка PIN если установлен
    const myPin = document.getElementById('myPin').value.trim();
    const theirPin = incoming.metadata && incoming.metadata.pin ? incoming.metadata.pin : '';
    if (myPin && theirPin !== myPin) {
      incoming.close();
      showToast('❌ Отклонён звонок — неверный PIN');
      return;
    }

    document.getElementById('incomingId').textContent = incoming.peer;
    document.getElementById('incoming').classList.add('active');

    document.getElementById('btnAccept').onclick = () => {
      document.getElementById('incoming').classList.remove('active');
      getMedia(callMode).then(stream => {
        localStream = stream;
        incoming.answer(stream);
        setupCall(incoming, stream, callMode);
      });
    };
    document.getElementById('btnDecline').onclick = () => {
      incoming.close();
      document.getElementById('incoming').classList.remove('active');
    };
  });

  peer.on('disconnected', () => {
    document.getElementById('statusDot').className = 'status-dot error';
    document.getElementById('statusText').textContent = 'отключён — переподключение...';
    setTimeout(() => peer.reconnect(), 2000);
  });

  peer.on('error', e => {
    document.getElementById('statusDot').className = 'status-dot error';
    document.getElementById('statusText').textContent = 'ошибка: ' + e.type;
    showToast('Ошибка: ' + e.type);
  });
}

function setMode(m) {
  callMode = m;
  document.getElementById('btnAudio').classList.toggle('active', m === 'audio');
  document.getElementById('btnVideo').classList.toggle('active', m === 'video');
}

function getMedia(mode) {
  return navigator.mediaDevices.getUserMedia({
    audio: true,
    video: mode === 'video' ? { width: 640, height: 480 } : false
  });
}

function makeCall() {
  let rid = document.getElementById('remoteIdInput').value.trim();
  // Если вставили ссылку — достаём ID
  try {
    const u = new URL(rid);
    rid = u.searchParams.get('call') || rid;
  } catch(e) {}

  if (!rid) { showToast('Введи ID собеседника'); return; }
  if (rid === myPeerId) { showToast('Нельзя позвонить самому себе :)'); return; }

  const pin = document.getElementById('remotePin').value.trim();
  getMedia(callMode).then(stream => {
    localStream = stream;
    const call = peer.call(rid, stream, { metadata: { mode: callMode, pin: pin } });
    setupCall(call, stream, callMode);
  }).catch(() => showToast('Нет доступа к камере/микрофону'));
}

function setupCall(call, stream, mode) {
  currentCall = call;

  // Показываем экран звонка
  document.getElementById('callScreen').classList.add('active');
  document.getElementById('mainCard').style.display = 'none';
  document.getElementById('dialCard').style.display = 'none';

  if (mode === 'video') {
    document.getElementById('videoGrid').style.display = 'grid';
    document.getElementById('audioIndicator').style.display = 'none';
    const lv = document.getElementById('localVideo');
    lv.srcObject = stream;
  } else {
    document.getElementById('videoGrid').style.display = 'none';
    document.getElementById('audioIndicator').style.display = 'block';
  }

  call.on('stream', remoteStream => {
    if (mode === 'video') {
      document.getElementById('remoteVideo').srcObject = remoteStream;
    }
  });

  call.on('close', endCall);
  call.on('error', () => { showToast('Ошибка соединения'); endCall(); });

  document.getElementById('btnHangup').onclick = () => { call.close(); endCall(); };
  document.getElementById('btnMute').onclick = toggleMute;
}

function toggleMute() {
  if (!localStream) return;
  muted = !muted;
  localStream.getAudioTracks().forEach(t => t.enabled = !muted);
  document.getElementById('btnMute').textContent = muted ? '🔇 без звука' : '🎤 звук';
  document.getElementById('btnMute').style.color = muted ? 'var(--red)' : '';
}

function endCall() {
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  document.getElementById('callScreen').classList.remove('active');
  document.getElementById('mainCard').style.display = '';
  document.getElementById('dialCard').style.display = '';
  document.getElementById('videoGrid').style.display = 'grid';
  document.getElementById('localVideo').srcObject = null;
  document.getElementById('remoteVideo').srcObject = null;
  muted = false;
  showToast('Звонок завершён');
}

function copyId() {
  const val = document.getElementById('myId').textContent;
  navigator.clipboard.writeText(val).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = '✓ скопировано';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'скопировать'; btn.classList.remove('copied'); }, 2000);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

initPeer();
</script>
</body>
</html>
